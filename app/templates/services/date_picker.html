  <link href="/stylesheets/moj-frontend-aa42b4449c.min.css" rel="stylesheet">
  <link href="/stylesheets/example-91bef8c342.min.css" rel="stylesheet">

  <style></style>

    
  <link rel="shortcut icon" href="/assets/images/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/images/moj-apple-touch-icon-180x180-2024.png" sizes="180x180">

  <body class="govuk-template__body app-example-page__wrapper">
    <script>document.body.className += ' js-enabled' + ('noModule' in HTMLScriptElement.prototype ? ' govuk-frontend-supported' : '');</script>

<div class="moj-datepicker" 
    
   data-module="moj-date-picker">
    
<div class="govuk-form-group">
  <label class="govuk-label" for="date">
    Date
  </label>

  <div id="date-hint" class="govuk-hint">
    For example, 17/5/2024.
  </div>
  <input

class="govuk-input moj-js-datepicker-input " id="date" name="date" type="text" aria-describedby="date-hint" autocomplete="off">

</div>
</div>
  <script type="module" src="/javascripts/govuk-frontend-717519264f.min.js"></script>
  <script type="module" src="/javascripts/moj-frontend-bb7382703f.min.js"></script>

  <script type="module">
    import * as GOVUKFrontend from '/javascripts/govuk-frontend-717519264f.min.js'
    import * as MOJFrontend from '/javascripts/moj-frontend-bb7382703f.min.js'

    GOVUKFrontend.initAll()
    MOJFrontend.initAll()

    window.GOVUKFrontend = GOVUKFrontend
    window.MOJFrontend = MOJFrontend
  </script>

  <script type="module"></script>

  </body>
</html>

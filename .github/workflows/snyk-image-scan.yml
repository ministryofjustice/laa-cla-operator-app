name: Perform Static Application Security Testing
description: A reusable workflow to perform SaST on a given repo. Please consult the Security Guardrails for Secure Pipelines for more info.

on:
  workflow_call:
    inputs:
      image_uri:
        description: "URI of image to scan. The workflow intentionally doesn't perform any image building."
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile that will be used by Snyk to scan"
        required: false
        default: "Dockerfile"
        type: string
      iac_path:
        description: "Path to repo's IaC. Leave unset to not run the checks"
        required: false
        default: ""
        type: string
      ECR_REGION:
        required: true
        type: string
      ECR_REPOSITORY:
        required: true
        type: string
    secrets:
      ECR_ROLE_TO_ASSUME:
        required: true
      SNYK_CLIENT_ID:
        required: true
      SNYK_CLIENT_SECRET:
        required: true
    

jobs:
  sast:
    name: Scan IaC & Container with Snyk
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Early exit if there's no container setup to scan
      - name: Check Dockerfile exists
        run: |
          if [ ! -f "${{ inputs.dockerfile_path }}" ]; then
            echo "::error::Dockerfile not found at ${{ inputs.dockerfile_path }}, seems there isn't a container to scan"
            exit 1
          fi

      - name: Assume role in Cloud Platform
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.ECR_REGION }}

      - name: Login to container repository
        uses: aws-actions/amazon-ecr-login@261fc3d4806db1fa66a15cc11113c456db8870a7 # v2.1.0
        id: login-ecr
        with:
          mask-password: true

      - name: Pull Docker image
        run: docker pull ${{ inputs.image_uri }}

      - name: Obtain Short-lived token
        id: auth
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/snyk-auth@main
        with:
          client_id: ${{ secrets.SNYK_CLIENT_ID }}
          client_secret: ${{ secrets.SNYK_CLIENT_SECRET }}

      - name: Install Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04

      - name: Scan dependencies using container runtime
        env:
          SNYK_OAUTH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          snyk container test ${{ inputs.image_uri }} \
            --severity-threshold=critical \
            --sarif-file-output=snyk.sarif \
            --file=${{ inputs.dockerfile_path }} \
            --app-vulns

      - name: Monitor current dependencies
        env:
          SNYK_OAUTH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          snyk container monitor ${{ inputs.image_uri }} \
            --file=${{ inputs.dockerfile_path }}

      - name: Scan IaC files
        if: hashFiles(inputs.iac_path)
        env:
          SNYK_OAUTH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          snyk iac test ${{ inputs.iac_path }} \
            --severity-threshold=critical \
            --sarif-file-output=snyk-iac.sarif

      - name: Sanitise SARIF
        if: always() && hashFiles('snyk.sarif') != ''
        run: |
          sed -i 's/"security-severity": "null"/"security-severity": "0"/g' snyk.sarif
          sed -i 's/"security-severity": "undefined"/"security-severity": "0"/g' snyk.sarif

      - name: Upload container SARIF
        if: always() && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: snyk.sarif

      - name: Upload IaC SARIF
        if: always() && hashFiles('snyk-iac.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: snyk-iac.sarif
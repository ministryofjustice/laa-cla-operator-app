name: Feature Branch

run-name: Feature - ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types:
      - reopened

permissions: {}

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    permissions: {}

  #   TODO: Re-enable this when we have tests with coverage reports to analyse
  #   name: Static Analysis
  #   needs: test
  #   uses: ./.github/workflows/static-analysis.yml
  #   secrets:
  #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #     GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  build-and-push:
    name: Build
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      ECR_REGION: ${{ vars.ECR_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    secrets:
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}

  scan-image:
    name: Snyk image scan
    needs: [build-and-push]
    uses: ./.github/workflows/sast.yml
    permissions:
      id-token: write
      contents: read
      security-events: write
      actions: read
    with:
      image_uri: ${{ needs.build-and-push.outputs.image_tag }}
      dockerfile_path: Dockerfile
    secrets:
      SNYK_CLIENT_ID: ${{ secrets.SNYK_CLIENT_ID }}
      SNYK_CLIENT_SECRET: ${{ secrets.SNYK_CLIENT_SECRET }}

  deploy-ephemeral:
    name: Ephemeral
    uses: ./.github/workflows/deploy-ephemeral.yml
    needs: [build-and-push]
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    with:
      environment: uat
      ECR_REGION: ${{ vars.ECR_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    secrets:
      ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
      KUBE_CERT: ${{ secrets.KUBE_CERT }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}

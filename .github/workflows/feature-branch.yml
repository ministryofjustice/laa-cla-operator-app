name: Feature Branch

run-name: Feature - ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types:
      - reopened

permissions: {}

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    permissions: {}

  #   TODO: Re-enable this when we have tests with coverage reports to analyse
  #   name: Static Analysis
  #   needs: test
  #   uses: ./.github/workflows/static-analysis.yml
  #   secrets:
  #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #     GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  build-and-push:
    name: Build
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      id-token: write
    with:
      ECR_REGION: ${{vars.ECR_REGION}}
      ECR_REPOSITORY: ${{vars.ECR_REPOSITORY}}
    secrets:
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}

  snyk-auth:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    outputs:
      snyk_token: ${{ steps.get_snyk_token.outputs.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - name: get_snyk_token
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/snyk-auth/@main
        with:
          client_id: ${{ secrets.SNYK_CLIENT_ID }}
          client_secret: ${{ secrets.SNYK_CLIENT_SECRET }}

  scan-image:
    needs: [build-and-push, snyk-auth]
    uses: ministryofjustice/laa-reusable-github-actions/.github/workflows/snyk.yml@main
    with:
      tag: snyk-scan
      dockerfile_path: "Dockerfile"
    secrets:
      snyk_token: ${{ needs.snyk-auth.outputs.snyk_token }}

  deploy-ephemeral:
     name: Ephemeral
     uses: ./.github/workflows/deploy-ephemeral.yml
     needs: [build-and-push, scan-image]
     permissions:
       contents: read
       id-token: write
       pull-requests: write
     with:
       environment: uat
       ECR_REGION: ${{vars.ECR_REGION}}
       ECR_REPOSITORY: ${{vars.ECR_REPOSITORY}}
     secrets:
       ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
       ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
       KUBE_CERT: ${{ secrets.KUBE_CERT }}
       KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
       KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
       KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}

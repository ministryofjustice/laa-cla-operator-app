name: Static Analysis
on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true
      GITLEAKS_LICENSE:
        required: true

permissions: {}

jobs:
  pip-compile:
    name: pip-compile
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout the repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Run pip-compile pre-commit
      id: pip_compile
      run: |
        python -m pip install --upgrade pip
        python -m pip install pre-commit pip-tools
        python -m pre_commit clean
        pip-compile requirements.in
        pip-compile requirements_dev.in

    - name: Check command result
      if: steps.pip_compile.outcome != 'success'
      run: |
        echo "pip-compile failed because requirements.in and requirements_dev.in are not properly compiled to requirements.txt and requirements_dev.txt." >&2
        exit 1

  devsecops:
    name: SCA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: ⚡️ SCA
        uses: ministryofjustice/devsecops-actions/sca@f965eb1771ec66cfc41d7d57dc607fa6dfbc10ed # v1.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Mandatory
          dependency-review-config-file: "./.github/workflows/dependency-review.yml" # Optional

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Lint
        uses: astral-sh/ruff-action@57714a7c8a2e59f32539362ba31877a1957dded1 # v3.5.1
        with:
          args: check --output-format=github
          version: ">=0.12.3"
      - name: Format
        uses: astral-sh/ruff-action@57714a7c8a2e59f32539362ba31877a1957dded1 # v3.5.1
        with:
          args: format --check
          version: ">=0.12.3"

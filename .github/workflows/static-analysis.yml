name: Static Analysis
on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true
      GITLEAKS_LICENSE:
        required: true

permissions: {}

jobs:
  pip-compile:
    name: pip-compile
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout the repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.13'

    - name: Run pip-compile pre-commit
      id: pip_compile
      run: |
        python -m pip install --upgrade pip
        python -m pip install pre-commit pip-tools
        python -m pre_commit clean
        pip-compile requirements.in
        pip-compile requirements_dev.in

    - name: Check command result
      if: steps.pip_compile.outcome != 'success'
      run: |
        echo "pip-compile failed because requirements.in and requirements_dev.in are not properly compiled to requirements.txt and requirements_dev.txt." >&2
        exit 1

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          args: check --output-format=github
          version: ">=0.12.3"
      - name: Format
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          args: format --check
          version: ">=0.12.3"

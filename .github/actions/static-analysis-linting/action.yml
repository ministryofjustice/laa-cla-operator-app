name: Static Analysis
description: 
inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.13'
  poetry-version:
    description: 'Poetry version to install'
    required: false
    default: '1.8.3'
  ruff-version:
    description: 'Ruff version constraint'
    required: false
    default: '>=0.12.3'

runs:
  using: composite
  steps:
    - name: Checkout the repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Poetry
      shell: bash
      run: python -m pip install --upgrade pip "poetry==${{ inputs.poetry-version }}"

    - name: Check pyproject.toml and poetry.lock are in sync
      shell: bash
      # No continue-on-error — a failure here stops the job and fails the caller.
      run: poetry check --lock

    - name: Lint
      uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
      with:
        args: check --output-format=github
        version: ${{ inputs.ruff-version }}

    - name: Format
      uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
      with:
        args: format --check
        version: ${{ inputs.ruff-version }}
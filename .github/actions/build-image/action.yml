name: Build and Push image
description: Builds a Docker image and pushes it to an ECR repository

inputs:
  ECR_REGION:
    required: true
    type: string
  ECR_REPOSITORY:
    required: true
    type: string
  ECR_ROLE_TO_ASSUME:
    required: true
    type: string
    description: "IAM role ARN to assume for ECR access (pass secrets.ECR_ROLE_TO_ASSUME from the caller)"
  IMAGE_TAG:
    required: false
    type: string
    default: ""
  DOCKERFILE_PATH:
    required: false
    type: string
    default: "./Dockerfile"
  DOCKER_CONTEXT:
    required: false
    type: string
    default: "."
  TARGET:
    required: false
    type: string
    default: ""

outputs:
  image_uri:
    description: "The full image URI (registry/repo:tag) generated by the meta step"
    value: ${{ steps.meta.outputs.tags }}
  image_tag:
    description: "The docker tag generated by the meta step"
    value: ${{ steps.meta.outputs.version }}

runs:
  using: composite
  steps:
    - name: Assume role in Cloud Platform
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        role-to-assume: ${{ inputs.ECR_ROLE_TO_ASSUME }}
        aws-region: ${{ inputs.ECR_REGION }}

    - name: Login to container repository
      uses: aws-actions/amazon-ecr-login@261fc3d4806db1fa66a15cc11113c456db8870a7 # v2.1.0
      id: login-ecr
      with:
        mask-password: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ECR_REPOSITORY }}
        tags: |
          type=raw,value=${{
            (inputs.IMAGE_TAG != '' && inputs.IMAGE_TAG)
            || (github.ref_name == 'main' && format('main-{0}', github.sha) || format('branch-{0}', github.sha))
          }}

    - name: Build and push a Docker image to the container repository
      id: docker-build
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        context: ${{ inputs.DOCKER_CONTEXT }}
        file: ${{ inputs.DOCKERFILE_PATH }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        target: ${{ inputs.TARGET }}
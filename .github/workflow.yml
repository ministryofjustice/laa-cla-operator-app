name: Workflow for building,testing, linting and deploy application to staging or production

on: 
  pull_requst:
  push:
    branches:
    [main]

jobs:
  static-analysis-linting:
      name: Static Analysis
      uses: ./.github/actions/static-analysis-linting
      permissions:
        contents: read
        security-events: write
      secrets:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  unit-testing-with-coverage-report:
    name: run coverage report and get coverage
    runs-on: ubuntu-latest
    needs: [static-analysis-linting]
    steps:
     - uses: ./.github/actions/tests 

  build-and-push:
    name: Build and push image to aws ECR
    runs-on: ubuntu-latest
    needs: [unit-testing-with-coverage-report]
    steps:
      - uses: ./.github/actions/build-image
        with:
          ECR_REGION: ${{secrets.ECR_REGION}}
          ECR_REPOSITORY: ${{secrets.ECR_REPOSITORY}}
          ECR_ROLE_TO_ASSUME: ${{secrets.ECR_ROLE_TO_ASSUME}}

  snyk-image-scan:
    name: Build
    needs: [build-and-push]
    uses: ministryofjustice/laa-reusable-github-actions/.github/workflows/sast.yml@df9a4a8ad625a391c27ccf81a1c1a2d7b23e6474 #unversioned
    permissions:
      id-token: write
      contents: read
      security-events: write
      actions: read
    with:
      image_uri: ${{ needs.build-and-push.outputs.image_uri }}
      exclude_base_image_vulns: true
      dockerfile_path: Dockerfile
    secrets:
      SNYK_CLIENT_ID: ${{ secrets.SNYK_CLIENT_ID }}
      SNYK_CLIENT_SECRET: ${{ secrets.SNYK_CLIENT_SECRET }}
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}

  deploy-feature-branch:
    name: Staging
    needs: deploy-uat 
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      uses: ./.github/actions/deploy 
      with:
        environment: uat
        ECR_REGION: ${{vars.ECR_REGION}}
        ECR_REPOSITORY: ${{vars.ECR_REPOSITORY}}
        DEPLOYMENT_URL: ${{vars.DEPLOYMENT_URL}}
      secrets:
        ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
        ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
        KUBE_CERT: ${{ secrets.KUBE_CERT }}
        KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
        KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}

  deploy-uat:
    name: Staging
    needs: deploy-uat 
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      uses: ./.github/actions/deploy 
      with:
        environment: uat
        ECR_REGION: ${{vars.ECR_REGION}}
        ECR_REPOSITORY: ${{vars.ECR_REPOSITORY}}
        DEPLOYMENT_URL: ${{vars.DEPLOYMENT_URL}}
      secrets:
        ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
        ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
        KUBE_CERT: ${{ secrets.KUBE_CERT }}
        KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
        KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}

  deploy-staging:
    name: Staging
    needs: deploy-uat 
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      uses: ./.github/actions/deploy 
      with:
        environment: staging
        ECR_REGION: ${{vars.ECR_REGION}}
        ECR_REPOSITORY: ${{vars.ECR_REPOSITORY}}
        DEPLOYMENT_URL: ${{vars.DEPLOYMENT_URL}}
      secrets:
        ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
        ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
        KUBE_CERT: ${{ secrets.KUBE_CERT }}
        KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
        KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
        KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}

  deploy-production:
    name: Production
    needs: deploy-staging
    if: github.ref_name == 'main'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      uses: ./.github/actions/deploy 
    with:
      environment: production
      ECR_REGION: ${{vars.ECR_REGION}}
      ECR_REPOSITORY: ${{vars.ECR_REPOSITORY}}
      DEPLOYMENT_URL: ${{vars.DEPLOYMENT_URL}}
    secrets:
      ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
      ECR_ROLE_TO_ASSUME: ${{ secrets.ECR_ROLE_TO_ASSUME }}
      KUBE_CERT: ${{ secrets.KUBE_CERT }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}


  


  










